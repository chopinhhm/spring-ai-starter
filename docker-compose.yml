version: '3.8'
services:
  app:
    build: .
    ports: ["8080:8080"]
    depends_on:
      - redis
      - mysql
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_starter
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_starter
    ports: ["3306:3306"]
